version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: smartlearn-web
    ports:
      - "8080:80"
    restart: unless-stopped
    volumes:
      # 开发模式：挂载本地文件，修改后自动生效
      - ./index.html:/usr/share/nginx/html/index.html
      - ./courses.html:/usr/share/nginx/html/courses.html
      - ./plan.html:/usr/share/nginx/html/plan.html
      - ./resources.html:/usr/share/nginx/html/resources.html
      - ./profile.html:/usr/share/nginx/html/profile.html
      - ./about.html:/usr/share/nginx/html/about.html
      - ./contact.html:/usr/share/nginx/html/contact.html
      - ./demo.html:/usr/share/nginx/html/demo.html
      - ./css:/usr/share/nginx/html/css
      - ./js:/usr/share/nginx/html/js
    networks:
      - smartlearn-network
    environment:
      - TZ=Asia/Shanghai

networks:
  smartlearn-network:
    driver: bridge
